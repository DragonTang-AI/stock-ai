# docker-compose.yml — AI-Stock 开发环境
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_stock_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_stock
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_stock_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_stock_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_stock
      REDIS_URL: redis://redis:6379/0
      IS_AUDIT_MODE: "true"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  # Celery worker（Phase 2 启用）
  # celery_worker:
  #   build: .
  #   command: celery -A app.tasks.celery_app worker --loglevel=info
  #   depends_on:
  #     - redis
  #     - postgres
  #   env_file:
  #     - .env

volumes:
  pg_data:
  redis_data:
